apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coredns-lab
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/codephilip/homelab.git
    targetRevision: main
    path: deploy/coredns
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
