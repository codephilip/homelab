---
# Source of truth: terraform/locals.tf
# When IPs/hostnames change there, mirror them here.

all:
  hosts:
    k3s-cp1:   { ansible_host: 10.10.20.110 }
    db1:       { ansible_host: 10.10.20.111 }
    ts-router: { ansible_host: 10.10.20.112 }
    backup1:   { ansible_host: 10.10.20.113 }
    k3s-w1:    { ansible_host: 10.10.20.120 }
    ci1:       { ansible_host: 10.10.20.121 }
    sandbox1:  { ansible_host: 10.10.20.122 }
    k3s-w2:    { ansible_host: 10.10.20.130 }
    obs1:      { ansible_host: 10.10.20.131 }
    util1:     { ansible_host: 10.10.20.132 }
    macmini:
      ansible_host: 10.10.60.50
      ansible_user: pg
      ansible_python_interpreter: /usr/bin/python3

  children:
    linux_vms:
      vars:
        ansible_user: ubuntu
      hosts:
        k3s-cp1: {}
        db1: {}
        ts-router: {}
        backup1: {}
        k3s-w1: {}
        ci1: {}
        sandbox1: {}
        k3s-w2: {}
        obs1: {}
        util1: {}
    mac:
      hosts: { macmini: {} }
    k3s_servers:
      hosts: { k3s-cp1: {} }
    k3s_agents:
      hosts:
        k3s-w1: {}
        k3s-w2: {}
    k3s_cluster:
      children:
        k3s_servers: {}
        k3s_agents: {}
    db:
      hosts: { db1: {} }
    tailscale_router:
      hosts: { ts-router: {} }
    backup:
      hosts: { backup1: {} }
    ci:
      hosts: { ci1: {} }
    sandbox:
      hosts: { sandbox1: {} }
    observability:
      hosts: { obs1: {} }
    utility:
      hosts: { util1: {} }
