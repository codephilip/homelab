---
# Source of truth: terraform/locals.tf
# When IPs/hostnames change there, mirror them here.
#
# These are EXAMPLE values. Replace the subnet (10.0.0.0/24), the AI VLAN
# subnet (10.0.10.0/24), and the host/VM IPs with whatever your network
# uses. The shape is intentional:
#   prox-N hosts live at .10N
#   VMs on prox-N live at .1N0–.1N9

all:
  hosts:
    k3s-cp1:   { ansible_host: 10.0.0.110 }
    db1:       { ansible_host: 10.0.0.111 }
    ts-router: { ansible_host: 10.0.0.112 }
    backup1:   { ansible_host: 10.0.0.113 }
    k3s-w1:    { ansible_host: 10.0.0.120 }
    ci1:       { ansible_host: 10.0.0.121 }
    sandbox1:  { ansible_host: 10.0.0.122 }
    k3s-w2:    { ansible_host: 10.0.0.130 }
    obs1:      { ansible_host: 10.0.0.131 }
    util1:     { ansible_host: 10.0.0.132 }
    macmini:
      ansible_host: 10.0.10.50
      ansible_user: pg
      ansible_python_interpreter: /usr/bin/python3

    prox-1: { ansible_host: 10.0.0.101, ansible_user: root }
    prox-2: { ansible_host: 10.0.0.102, ansible_user: root }
    prox-3: { ansible_host: 10.0.0.103, ansible_user: root }

  children:
    proxmox_hosts:
      hosts:
        prox-1: {}
        prox-2: {}
        prox-3: {}
    linux_vms:
      vars:
        ansible_user: ubuntu
      hosts:
        k3s-cp1: {}
        db1: {}
        ts-router: {}
        backup1: {}
        k3s-w1: {}
        ci1: {}
        sandbox1: {}
        k3s-w2: {}
        obs1: {}
        util1: {}
    mac:
      hosts: { macmini: {} }
    k3s_servers:
      hosts: { k3s-cp1: {} }
    k3s_agents:
      hosts:
        k3s-w1: {}
        k3s-w2: {}
    k3s_cluster:
      children:
        k3s_servers: {}
        k3s_agents: {}
    db:
      hosts: { db1: {} }
    tailscale_router:
      hosts: { ts-router: {} }
    backup:
      hosts: { backup1: {} }
    ci:
      hosts: { ci1: {} }
    sandbox:
      hosts: { sandbox1: {} }
    observability:
      hosts: { obs1: {} }
    utility:
      hosts: { util1: {} }
