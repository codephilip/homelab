---
# Mac Mini setup. Treated as a standalone compute node, not a k3s member.
# - Ollama (local LLMs) listening on the tailnet so cluster apps can call it
# - Tailscale (Mac App)
# - Python research env: pyenv + uv
# - Common CLI tools
#
# Tailscale sign-in is interactive (open the menu-bar app + sign in once).
# Everything else is fully scripted.

- name: Mac Mini
  hosts: mac
  gather_facts: true

  vars:
    brew_path: >-
      {{ '/opt/homebrew/bin/brew' if ansible_architecture == 'arm64'
         else '/usr/local/bin/brew' }}

  tasks:
    - name: Check homebrew is installed
      ansible.builtin.command: "{{ brew_path }} --version"
      register: brew_check
      changed_when: false
      failed_when: brew_check.rc != 0

    - name: Install CLI formulae
      community.general.homebrew:
        name:
          - ollama
          - pyenv
          - uv
          - jq
          - htop
          - direnv
        state: present
        path: "{{ brew_path | dirname }}"

    # Skipping cask install via Ansible — pkg installers need sudo password,
    # which SSH-without-TTY can't provide. Install Tailscale manually:
    #   https://tailscale.com/download/macos    (or `brew install --cask tailscale-app` on the Mini directly)
    # Then sign in via the menu-bar app.

    # ---- Ollama: bind on all interfaces so apps in k3s (and via Tailscale) can hit it ----
    # We can't use `launchctl setenv` — modern launchd doesn't propagate session
    # env into LaunchAgents. And we can't use `brew services restart` after
    # editing the plist — brew regenerates the plist from its template and
    # strips our additions. So: have brew generate the plist once, stop the
    # service, inject OLLAMA_HOST via PlistBuddy, then load with launchctl
    # directly (bypassing brew services). Re-running `brew services …` on
    # ollama later will undo this — re-run this playbook to repair.
    - name: Ensure brew-managed ollama plist exists
      ansible.builtin.command: "{{ brew_path }} services start ollama"
      changed_when: false

    - name: Stop ollama via brew services (unload before editing plist)
      ansible.builtin.command: "{{ brew_path }} services stop ollama"
      changed_when: false
      failed_when: false

    - name: Inject OLLAMA_HOST=0.0.0.0:11434 into the launchd plist
      ansible.builtin.shell: |
        PLIST=~/Library/LaunchAgents/homebrew.mxcl.ollama.plist
        /usr/libexec/PlistBuddy -c "Set :EnvironmentVariables:OLLAMA_HOST 0.0.0.0:11434" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :EnvironmentVariables:OLLAMA_HOST string 0.0.0.0:11434" "$PLIST"
      changed_when: false

    - name: Load ollama via launchctl (preserves our plist edit)
      ansible.builtin.shell: |
        PLIST=~/Library/LaunchAgents/homebrew.mxcl.ollama.plist
        launchctl bootout gui/$(id -u)/homebrew.mxcl.ollama 2>/dev/null || true
        launchctl bootstrap gui/$(id -u) "$PLIST"
      changed_when: false

    - name: Wait for ollama to be listening on all interfaces
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 11434
        timeout: 30

    # ---- Final hints ----
    - name: Next steps
      ansible.builtin.debug:
        msg: |
          ✔ Ollama listening on 0.0.0.0:11434 (test from your laptop:
              curl http://{{ ansible_host }}:11434/api/tags)

          → Pull a model on the Mini:
              ssh macmini 'ollama pull llama3.1:8b'

          → Open Tailscale (Applications → Tailscale, or click the menu-bar
            icon) and sign in to the same tailnet. After that, the Mini will
            be reachable by name from anywhere on your tailnet.

          → OLLAMA_HOST=0.0.0.0:11434 is baked into the brew-managed
            LaunchAgent plist. It survives reboots, but any future
            `brew services start|stop|restart ollama` will regenerate
            the plist and strip the var — re-run this playbook to repair.
