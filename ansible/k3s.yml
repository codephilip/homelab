---
# Install k3s as a single-cluster across the three k3s VMs.
# - k3s-cp1 is the control plane (single server, no HA)
# - k3s-w1 and k3s-w2 join as agents
#
# Safe to re-run: the install script no-ops when k3s is already present.

- name: k3s — control plane
  hosts: k3s_servers
  become: true
  gather_facts: false
  vars:
    k3s_version: v1.30.5+k3s1

  tasks:
    - name: Install k3s server
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION={{ k3s_version }} \
          sh -s - server \
            --disable=traefik \
            --write-kubeconfig-mode=644 \
            --node-name={{ inventory_hostname }} \
            --tls-san={{ ansible_host }} \
            --tls-san=k3s.lab
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s API to be ready
      ansible.builtin.wait_for:
        port: 6443
        delay: 2
        timeout: 90

    - name: Read node token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token_raw

    - name: Set k3s_node_token fact
      ansible.builtin.set_fact:
        k3s_node_token: "{{ node_token_raw.content | b64decode | trim }}"

    - name: Fetch kubeconfig to local laptop
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ playbook_dir }}/../.kube/home.yaml"
        flat: true

    - name: Rewrite kubeconfig server URL to use the cluster IP (not 127.0.0.1)
      delegate_to: localhost
      become: false
      ansible.builtin.replace:
        path: "{{ playbook_dir }}/../.kube/home.yaml"
        regexp: 'server: https://127\.0\.0\.1:6443'
        replace: "server: https://{{ ansible_host }}:6443"

    - name: Lock down local kubeconfig perms (600)
      delegate_to: localhost
      become: false
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../.kube/home.yaml"
        mode: '0600'

- name: k3s — agents
  hosts: k3s_agents
  become: true
  gather_facts: false
  vars:
    k3s_version: v1.30.5+k3s1
    k3s_server_ip: "{{ hostvars[groups['k3s_servers'][0]]['ansible_host'] }}"
    k3s_node_token: "{{ hostvars[groups['k3s_servers'][0]]['k3s_node_token'] }}"

  tasks:
    - name: Install k3s agent
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION={{ k3s_version }} \
          K3S_URL=https://{{ k3s_server_ip }}:6443 \
          K3S_TOKEN={{ k3s_node_token }} \
          sh -s - agent --node-name={{ inventory_hostname }}
      args:
        creates: /usr/local/bin/k3s
